{# Bottom of farm_unified_sidebar: app settings, logout, help. Logout uses data-farm-api-logout (wired in farm_chrome_bundle.html). #}
{% set _settings_active = request.path.rstrip('/') == '/settings' %}
            <div class="shrink-0 border-t border-gray-200 dark:border-gray-700">
                <div class="space-y-1 p-3">
                    <a href="/settings" class="group flex items-center rounded-lg px-3 py-2.5 transition-all duration-200 {% if _settings_active %}bg-gray-100 font-semibold text-gray-900 ring-1 ring-gray-200 dark:bg-gray-800 dark:text-white dark:ring-gray-600{% else %}text-gray-700 hover:bg-gray-100 dark:text-gray-200 dark:hover:bg-gray-800/80{% endif %}">
                        <span class="mr-3 flex h-8 w-8 shrink-0 items-center justify-center rounded-md bg-gray-100 text-gray-600 dark:bg-gray-800 dark:text-gray-400">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        </span>
                        <span class="min-w-0 flex-1 truncate text-sm font-medium">Settings</span>
                        <svg class="ml-1 h-4 w-4 shrink-0 text-gray-400 opacity-0 transition-opacity group-hover:opacity-100 dark:text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
                    </a>
                    <button type="button" data-farm-api-logout class="group flex w-full items-center rounded-lg px-3 py-2.5 text-left text-red-600 transition-all duration-200 hover:bg-red-50 dark:text-red-400 dark:hover:bg-red-950/30">
                        <span class="mr-3 flex h-8 w-8 shrink-0 items-center justify-center rounded-md bg-red-50 text-red-600 dark:bg-red-950/40 dark:text-red-300">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                        </span>
                        <span class="min-w-0 flex-1 truncate text-sm font-medium">Log out</span>
                    </button>
                </div>
                <div class="border-t border-gray-200 px-3 pb-3 pt-0 dark:border-gray-700">
                    <div class="rounded-xl border border-pink-200/60 bg-gradient-to-r from-pink-50 to-purple-50 p-3 shadow-sm dark:border-pink-700/60 dark:from-pink-900/20 dark:to-purple-900/20">
                        <div class="flex items-center gap-2">
                            <div class="flex h-7 w-7 shrink-0 items-center justify-center rounded-lg bg-gradient-to-br from-pink-500 via-purple-500 to-blue-600 shadow-md">
                                <svg class="h-3 w-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                            </div>
                            <div class="min-w-0 flex-1">
                                <p class="text-xs font-semibold text-gray-900 dark:text-white">Need help?</p>
                                <p class="text-[11px] text-gray-600 dark:text-gray-400">Contact support</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
