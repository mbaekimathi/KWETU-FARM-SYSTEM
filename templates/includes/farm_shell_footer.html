{# Unified farm admin footer #}
{% set farm_shell_footer_note = farm_shell_footer_note|default('') %}
    <footer class="farm-chrome-footer bg-white/90 dark:bg-gray-950/90 backdrop-blur-lg border-t border-gray-200/90 dark:border-gray-800 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-2">
            <div class="flex flex-col md:flex-row justify-between items-center gap-1.5">
                <div class="flex items-center gap-3">
                    <div class="farm-chrome-logo-tile farm-chrome-logo-tile--sm w-8 h-8 flex items-center justify-center bg-gradient-to-br from-emerald-600 via-teal-600 to-slate-700 rounded-lg shadow-sm shrink-0" aria-hidden="true">
                        <i class="fas fa-leaf text-white text-xs leading-none drop-shadow"></i>
                    </div>
                    <div class="flex flex-wrap items-center gap-x-3 gap-y-1 text-[11px] text-gray-500 dark:text-gray-400">
                        <span class="inline-flex items-center gap-1">
                            <i class="fas fa-building text-[10px] text-emerald-600 dark:text-emerald-400" aria-hidden="true"></i>
                            <span class="font-semibold text-gray-900 dark:text-white">ModernFarm Pro</span>
                        </span>
                        <span class="inline-flex items-center gap-1">
                            <i class="fas fa-code-branch text-[10px] text-sky-600 dark:text-sky-400" aria-hidden="true"></i>
                            <span>Version {{ app_version_label }}</span>
                        </span>
                        <span class="inline-flex items-center gap-1">
                            <i class="fas fa-bolt text-[10px] text-violet-600 dark:text-violet-400" aria-hidden="true"></i>
                            <span>Powered by JOT TECH</span>
                        </span>
                        {% if farm_shell_footer_note %}
                        <span class="inline-flex items-center gap-1">
                            <i class="fas fa-circle-info text-[10px] text-gray-400 dark:text-gray-500" aria-hidden="true"></i>
                            <span>{{ farm_shell_footer_note }}</span>
                        </span>
                        {% endif %}
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <p class="text-[11px] text-gray-500 dark:text-gray-400 tabular-nums">© Meru Farm. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>
